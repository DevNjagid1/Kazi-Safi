<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Employee</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { margin-top: 20px; padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Edit Employee</h1>
    <form method="post">
        {% csrf_token %}
        <label>Employee ID:</label>
        <input type="text" name="employee_id" value="{{ employee.employee_id }}" required>

        <label>Department:</label>
        <input type="text" name="department" value="{{ employee.department }}" required>

        <label>Position:</label>
        <input type="text" name="position" value="{{ employee.position }}" required>

        <label>Salary:</label>
        <input type="number" step="0.01" name="salary" value="{{ employee.salary }}" required>

        <label>Phone:</label>
        <input type="text" name="phone" value="{{ employee.phone }}">

        <label>Status:</label>
        <select name="status">
            <option value="active" {% if employee.status == 'active' %}selected{% endif %}>Active</option>
            <option value="inactive" {% if employee.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>

        <button type="submit">Save Changes</button>
    </form>
</body>
</html>
