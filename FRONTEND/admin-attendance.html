<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi Safi - Attendance Management</title>
    <link rel="stylesheet" href="attendance.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24" fill="white" width="24" height="24"><path d="M12 2L14.5 9H22L16 14L18.5 21L12 17L5.5 21L8 14L2 9H9.5L12 2Z"/></svg>
                </div>
                <div>
                    <h3>Kazi Safi</h3>
                    <p>Work-Pay System</p>
                </div>
            </div>
             <nav class="menu">
                <a href="admin-dashboard.html" class="nav-item">Dashboard</a>
                <a href="manage-employees.html" class="nav-item">Employees</a>
                <a href="admin-attendance.html" class="nav-item active">Attendance</a>
                <a href="payroll.html" class="nav-item">Payroll</a>
                <a href="support-inbox.html" class="nav-item">Support Inbox</a>
                <a href="audit-logs.html" class="nav-item">Audit Logs</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info"><strong>John Kamau</strong><span>Administrator</span></div>
                <button id="logoutBtn" class="logout-link">Log out</button>
            </div>
        </aside>

        <main class="content-area">
            <header class="section-header">
                <h1>Attendance Management</h1>
                <p>Review hours (Overtime compensates for lateness; starts after 4:00 PM)</p>
            </header>

            <div class="alert-banner" id="adminAlert">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                <span id="pendingCountText">Checking records...</span>
            </div>

            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="approved">Approved</button>
                <button class="filter-btn" data-filter="rejected">Rejected</button>
            </div>

            <div class="table-container">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Date</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Net Overtime</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="attendanceBody">
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="attendance.js"></script>
</body>
</html>
