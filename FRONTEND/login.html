<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kazi Safi</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="auth-container">
        <header>
            <div class="logo-box">
                <svg viewBox="0 0 24 24" width="30" height="30" fill="white">
                    <path d="M12 2L14.5 9H22L16 14L18.5 21L12 17L5.5 21L8 14L2 9H9.5L12 2Z" />
                </svg>
            </div>
            <h1>Kazi Safi</h1>
            <p class="subtitle">Work-Pay Management System</p>
        </header>

        <main class="auth-card">
            <h2>Welcome back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="role">I am a...</label>
                    <div class="select-wrapper">
                        <select id="role" required>
                            <option value="" disabled selected>Select your role</option>
                            <option value="employee">Employee</option>
                            <option value="admin">Administrator</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="identifier">ID or Email</label>
                    <input type="text" id="identifier" placeholder="e.g., EMP001 or email@kazisafi.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" id="togglePassword" class="toggle-password-btn">
                            <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="eye-off-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <div class="forgot-link">
                        <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">Sign in</button>
            </form>
            
            <div class="toggle-view">
                <p>No account? <a href="register.html">Register here</a></p>
            </div>
        </main>
    </div>
    <script src="login.js"></script>
</body>
</html>
