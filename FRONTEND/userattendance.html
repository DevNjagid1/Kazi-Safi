<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazi Safi - Attendance</title>
    <link rel="stylesheet" href="userattendance.css">
</head>
<body>

<div class="dashboard-wrapper">

    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24" fill="white" width="24" height="24">
                    <path d="M12 2L14.5 9H22L16 14L18.5 21L12 17L5.5 21L8 14L2 9H9.5L12 2Z"/>
                </svg>
            </div>
            <div class="brand-text">
                <h3>Kazi Safi</h3>
                <p>Work-Pay System</p>
            </div>
        </div>

        <nav class="menu">
            <a href="user.html" class="nav-item">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2">
                    <rect x="3" y="3" width="7" height="7"/>
                    <rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/>
                    <rect x="3" y="14" width="7" height="7"/>
                </svg>
                Dashboard
            </a>

            <a href="userattendance.html" class="nav-item active">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                Attendance
            </a>

            <a href="userearning.html" class="nav-item">My Earnings</a>
            <a href="userwithdraw.html" class="nav-item">Withdraw</a>
            <a href="contactadmin.html" class="nav-item">Contact Admin</a>

        <div class="sidebar-footer">
            <div class="user-info">
                <strong id="employeeName">Employee Name</strong>
                <span>Employee</span>
            </div>
            <button id="logoutBtn" class="logout-btn">Log out</button>
        </div>
    </aside>

    <main class="content-area">

        <header class="section-header">
            <h1>Daily Attendance</h1>
            <p>Check in when you start work and check out when leaving.</p>
        </header>

        <div class="main-attendance-card">

            <div class="clock-container">
                <div class="clock-icon">
                    <svg viewBox="0 0 24 24" width="32" height="32" stroke="white" fill="none" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <h2 id="currentDate"></h2>
                <h1 id="currentTime"></h1>
            </div>

            <div id="actionArea" class="check-buttons">
                <button id="checkInBtn" class="checkin-btn" onclick="checkIn()">Check In</button>
                <button id="checkOutBtn" class="checkout-btn" onclick="checkOut()" disabled>Check Out</button>
            </div>

            <div id="workTimer" class="work-timer">00:00:00</div>

        </div>


        <div class="summary-stats">
            <div class="sum-card">
                <span id="countPending" class="sum-val pending-txt">0</span>
                <span class="sum-label">Pending</span>
            </div>
            <div class="sum-card">
                <span id="countApproved" class="sum-val approved-txt">0</span>
                <span class="sum-label">Approved</span>
            </div>
            <div class="sum-card">
                <span id="countRejected" class="sum-val rejected-txt">0</span>
                <span class="sum-label">Rejected</span>
            </div>
        </div>

        <div class="history-section">
            <h3>Attendance History</h3>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Day</th>
                            <th>Check-In</th>
                            <th>Check-Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>

    </main>
</div>

<script src="userattendance.js"></script>
</body>
</html>
